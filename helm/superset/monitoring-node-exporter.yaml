# =============================================================================
# Superset 生产级监控配置 - Node-Exporter + Prometheus + Grafana
# =============================================================================
#
# 组件说明:
# ----------
# 1. node-exporter: DaemonSet 部署在每个 Node 上，暴露宿主机指标
#    - CPU、内存、磁盘、网络等底层指标
#    - 端口: 9100
#
# 2. kube-prometheus-stack: 包含 Prometheus + Grafana + AlertManager
#    - Prometheus: 抓取和存储指标
#    - Grafana: 可视化 Dashboard
#    - AlertManager: 告警通知
#
# 使用方法:
# ----------
# kubectl create namespace monitoring
# helm install node-exporter prometheus-community/prometheus-node-exporter -f monitoring-node-exporter.yaml
# helm install kube-prometheus prometheus-community/kube-prometheus-stack -f monitoring-prometheus.yaml
# kubectl apply -f superset-servicemonitor.yaml
# =============================================================================

# -----------------------------------------------------------------------------
# Node-Exporter 配置
# -----------------------------------------------------------------------------
# 每个 Kubernetes Node 上运行一个实例，收集宿主机指标

service:
  type: ClusterIP
  port: 9100
  targetPort: 9100
  # 让 Prometheus Service 能够发现
  clusterIP: None  # Headless Service

# ServiceMonitor 用于 Prometheus 自动发现
serviceMonitor:
  enabled: true
  interval: 15s
  namespace: monitoring
  # 标签选择器，Prometheus 通过 release=kube-prometheus 发现
  selector:
    release: kube-prometheus

# PodMonitor（Kubernetes 1.20+）
podMonitor:
  enabled: true
  interval: 15s
  namespace: monitoring
  selector:
    release: kube-prometheus

# 资源配置 - 轻量级，每个节点仅需少量资源
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# 容忍所有污点，确保在所有节点运行（包括 Master）
tolerations:
  - operator: Exists

# 更新策略 - RollingUpdate 确保服务不中断
updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 1

# 服务账户配置
serviceAccount:
  create: true
  name: node-exporter
  annotations:
    # GKE 工作负载身份（如果需要访问 GCP API）
    # iam.gke.io/gcp-service-account: monitoring@your-project.iam.gserviceaccount.com

# -----------------------------------------------------------------------------
# 关键 metrics 路径配置
# -----------------------------------------------------------------------------
# node-exporter 默认暴露以下端点:
# - /metrics - 主指标端点
# - /health - 健康检查
# - /probes - 探测端点

# 网络配置
networkPolicy:
  enabled: false  # 根据需要开启

# -----------------------------------------------------------------------------
# Kubernetes 污点说明
# -----------------------------------------------------------------------------
# GKE Master 节点通常有污点:
#   node-role.kubernetes.io/master:NoSchedule
#   - 容忍此污点才能在 Master 上运行 node-exporter
# 由于 tolerations: operator: Exists 会匹配所有污点，所以可以运行在任意节点
