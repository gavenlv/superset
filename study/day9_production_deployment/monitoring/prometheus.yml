global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alertmanager 配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 加载告警规则
rule_files:
  - "alert_rules.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 15s
    metrics_path: /metrics

  # Superset 应用监控
  - job_name: 'superset'
    static_configs:
      - targets: ['superset:8088']
    scrape_interval: 30s
    metrics_path: /metrics
    scrape_timeout: 10s
    params:
      format: ['prometheus']

  # PostgreSQL 数据库监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis 监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # Node 系统监控
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # Nginx 监控
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 30s

  # Docker 容器监控
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s

  # Celery 任务监控
  - job_name: 'celery'
    static_configs:
      - targets: ['celery-exporter:9540']
    scrape_interval: 30s

  # Blackbox 外部监控
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://superset:8088/health
        - https://superset.yourdomain.com/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Kubernetes 监控 (如果使用 K8s)
  - job_name: 'kubernetes-apiservers'
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - default
            - superset
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
        action: keep
        regex: default;kubernetes;https

  - job_name: 'kubernetes-nodes'
    kubernetes_sd_configs:
      - role: node
    scheme: https
    tls_config:
      ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
    relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)
      - target_label: __address__
        replacement: kubernetes.default.svc:443
      - source_labels: [__meta_kubernetes_node_name]
        regex: (.+)
        target_label: __metrics_path__
        replacement: /api/v1/nodes/${1}/proxy/metrics

  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - superset
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

# 记录规则
recording_rules:
  # Superset 应用指标
  - name: superset.rules
    interval: 30s
    rules:
      # 请求速率
      - record: superset:request_rate
        expr: rate(superset_requests_total[5m])
      
      # 错误率
      - record: superset:error_rate
        expr: rate(superset_requests_total{status=~"5.."}[5m]) / rate(superset_requests_total[5m])
      
      # 响应时间
      - record: superset:response_time_95th
        expr: histogram_quantile(0.95, rate(superset_request_duration_seconds_bucket[5m]))
      
      # 活跃用户数
      - record: superset:active_users
        expr: superset_active_users

  # 系统资源指标
  - name: system.rules
    interval: 30s
    rules:
      # CPU 使用率
      - record: system:cpu_usage
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
      
      # 内存使用率
      - record: system:memory_usage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
      
      # 磁盘使用率
      - record: system:disk_usage
        expr: (1 - (node_filesystem_avail_bytes / node_filesystem_size_bytes)) * 100
      
      # 网络 I/O
      - record: system:network_io
        expr: rate(node_network_receive_bytes_total[5m]) + rate(node_network_transmit_bytes_total[5m])

  # 数据库指标
  - name: database.rules
    interval: 30s
    rules:
      # 数据库连接数
      - record: database:connections
        expr: pg_stat_database_numbackends
      
      # 查询执行时间
      - record: database:query_time_95th
        expr: histogram_quantile(0.95, rate(pg_stat_statements_total_time_bucket[5m]))
      
      # 缓存命中率
      - record: database:cache_hit_ratio
        expr: pg_stat_database_blks_hit / (pg_stat_database_blks_hit + pg_stat_database_blks_read)

  # Redis 指标
  - name: redis.rules
    interval: 30s
    rules:
      # Redis 内存使用
      - record: redis:memory_usage
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100
      
      # 命令执行速率
      - record: redis:commands_rate
        expr: rate(redis_commands_processed_total[5m])
      
      # 键空间命中率
      - record: redis:keyspace_hit_ratio
        expr: rate(redis_keyspace_hits_total[5m]) / (rate(redis_keyspace_hits_total[5m]) + rate(redis_keyspace_misses_total[5m]))

# 远程写入配置 (可选)
remote_write:
  - url: "https://prometheus-remote-write-endpoint/api/v1/write"
    write_relabel_configs:
      - source_labels: [__name__]
        regex: '(superset|system|database|redis):.*'
        action: keep

# 远程读取配置 (可选)
remote_read:
  - url: "https://prometheus-remote-read-endpoint/api/v1/read"
    read_recent: true 